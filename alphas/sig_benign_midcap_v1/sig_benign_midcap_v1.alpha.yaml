# ── Identity & Provenance ─────────────────────────────────
schema_version: "1.1"
layer: SIGNAL
alpha_id: sig_benign_midcap_v1
version: "1.0.0"
description: |
  Kyle-style informed-flow footprint on L1 (OFI + micro-price vs mid)
  in the benign / normal microstructure regime for mid-cap names.
  Institutional parent fills often arrive as VWAP/TWAP slices; those
  waves imprint the same directional imbalance this alpha reads.  The
  regime gate suppresses toxic / breakout states where the footprint
  mean-reverts or inverts.

# ── Hypothesis (causal mechanism) ─────────────────────────
hypothesis: |
  When informed trading pressure is present but transient-impact
  conditions remain orderly (low spread z-score, HMM normal-regime
  posterior elevated), persistent same-sign OFI and micro-price tilt
  relative to mid reveal a Kyle-style information footprint on L1.
  VWAP/TWAP parent slicing is a common *execution modality* that
  produces such footprints; the tradeable claim is the footprint
  itself, not the algorithm tag.  Conditional on the HMM ``normal``
  posterior and mild spreads, residual mid drift over the 120-second
  horizon aligns with the signed imbalance; the signal sizes exposure
  by standardised OFI rather than by parent-order identifiers (which
  are unobserved).

falsification_criteria:
  - |
    Spearman correlation between ofi_ewma over the prior 120s and
    return over the next 120s drops below 0.05 in the normal regime
    for >= 4 consecutive weeks.  (Mechanism requires sustained
    positive correlation; loss indicates parent-order behaviour
    has changed or the signature is saturated.)
  - |
    Out-of-sample DSR (deflated Sharpe ratio) below 1.0 across any
    single calendar quarter after promotion to LIVE.
  - |
    SEC/FINRA mandates execution transparency that eliminates the
    VWAP/TWAP slicing advantage; the parent-order leakage signature
    disappears from L1 entirely.
  - |
    Realised volatility enters a sustained high regime (HMM
    posterior P(vol_breakout) > 0.5 for > 30 trading days); the
    on-condition becomes unreachable and the strategy is inactive.

# ── Layer-1 sensor dependencies (Phase 3) ─────────────────
# All sensors ship with the platform and are wired via the
# platform.yaml ``sensors:`` block.  G6 (feature/sensor dependency
# DAG) verifies every entry resolves at boot.
#
# sensor_audit_2026-07-02 P1: ``micro_price`` dropped.  It was declared here
# (and as an l1_signature_sensors fingerprint below) but evaluate() never
# reads a micro_price-derived value — the exact "cosmetic fingerprint"
# pattern the P1-5 fix below already removed for kyle_lambda_60s. The
# mechanism this alpha actually reads is book_imbalance (the level-invariant
# transform of the micro-price deviation; see its docstring), which is now
# itself a recognised KYLE_INFO fingerprint (G16 rule 5).
depends_on_sensors:
  - ofi_ewma
  - book_imbalance
  - spread_z_30d
  - realized_vol_30s

# ── Universe ──────────────────────────────────────────────
# Universe selection is config-driven (mid-cap subset of the
# active platform symbols).  No static list is pinned here; the
# operator restricts via ``platform.yaml`` for the deployment.

# ── Parameters ────────────────────────────────────────────
parameters:
  entry_threshold_z:
    type: float
    default: 0.8
    min: 0.5
    max: 3.0
    description: |
      Entry trigger on |ofi_ewma_zscore|.  ~2.5% tail of the
      normal-regime OFI z-score distribution at the default value.
  edge_per_z_bps:
    type: float
    default: 4.0
    min: 1.0
    max: 8.0
    description: |
      Linear extrapolation slope from |z| to expected edge in bps.
      Capped at edge_cap_bps to avoid extrapolation tail risk.
  edge_cap_bps:
    type: float
    default: 20.0
    min: 5.0
    max: 50.0
    description: |
      Maximum reported ``edge_estimate_bps``; safety cap.
  strength_cap:
    type: float
    default: 2.0
    min: 1.0
    max: 4.0
    description: |
      Ceiling for convex strength scaling.  Signals at |z| == threshold*2
      still produce strength==1.0 (backward-compatible floor); the cap
      allows high-z signals to size proportionally larger up to this
      multiple of the base unit size.
  imbalance_floor:
    type: float
    default: 0.05
    min: 0.0
    max: 0.5
    description: |
      Audit 3P-3: minimum |book_imbalance_mean| required to count as a
      same-side queue confirmation of the OFI footprint.  Replaces the dead
      ``imb == 0.0`` exact-equality check — now that ``imb`` is a horizon mean
      (a float that is essentially never exactly 0.0), an epsilon band is
      needed so a near-zero mean (no real confirmation) does not pass.
  cost_floor_bps:
    type: float
    default: 5.0
    min: 5.0
    max: 30.0
    description: |
      One-way cost floor (bps). Audit P1-2: self-suppress entries whose
      computed ``edge_bps`` does not exceed the disclosed one-way cost
      (half_spread + impact + fee = 2.0 + 2.0 + 1.0 = 5.0). Without it the
      alpha emits entries with edge as low as 3.2 bps (|z| at the default
      0.8 threshold). The round-trip Inv-12 bar (~1.5x round-trip) is
      enforced at runtime by the B4 gate. Keep aligned with
      cost_arithmetic.
# ── Horizon (Layer-2 boundary) ────────────────────────────
horizon_seconds: 120

# ── Risk Budget ───────────────────────────────────────────
risk_budget:
  max_position_per_symbol: 500
  max_gross_exposure_pct: 25.0
  max_drawdown_pct: 1.0
  capital_allocation_pct: 25.0

# ── Regime Gate (Phase 3 DSL — §8.4) ──────────────────────
regime_gate:
  regime_engine: hmm_3state_fractional
  on_condition: |
    P(normal) > 0.5 and spread_z_30d < 1.5
  off_condition: |
    P(normal) < 0.35 or spread_z_30d > 3.0 or realized_vol_30s_zscore > 4.5

# ── Cost Arithmetic Disclosure (G12) ──────────────────────
cost_arithmetic:
  edge_estimate_bps: 9.0
  half_spread_bps: 2.0
  impact_bps: 2.0
  fee_bps: 1.0
  margin_ratio: 1.8
  # Audit P1-1: one-way components. Round-trip ≈ 10.0 bps; edge/round-trip
  # ≈ 0.90. The runtime B4 gate enforces the round-trip Inv-12 bar.
  cost_basis: one_way

# Audit P1-5: the prior block declared ``kyle_lambda_60s`` as the
# KYLE_INFO fingerprint, but this alpha neither depends on nor reads it —
# a cosmetic fingerprint. The mechanism it actually exploits is the
# order-flow imbalance footprint: standardised ``ofi_ewma`` confirmed by
# ``book_imbalance`` (the level-invariant L1 transform of micro-price vs
# mid, platform.yaml: (micro - mid)/spread = book_imbalance / 2).
#
# sensor_audit_2026-07-02 P1: the fingerprint had been declared as
# ``micro_price`` on the theory that reading ``book_imbalance`` counted as
# reading it "via its transform" — but evaluate() never touches a
# micro_price-derived value, so this was the same cosmetic-fingerprint
# pattern the P1-5 note above already fixed once in this file, recurring
# through a different sensor. ``book_imbalance`` is now itself a recognised
# KYLE_INFO fingerprint (G16 rule 5, layer_validator._FAMILY_FINGERPRINT_SENSORS)
# since it is an independently-computed L1 signature, not merely derived from
# micro_price. All l1_signature_sensors are a subset of depends_on_sensors and
# are each read in evaluate() or the regime gate (no cosmetic entries).
trend_mechanism:
  family: KYLE_INFO
  expected_half_life_seconds: 120
  l1_signature_sensors:
    - book_imbalance
    - ofi_ewma
    - spread_z_30d
  failure_signature:
    - "spread_z_30d > 3.0"
    - "P(vol_breakout) > 0.5"

# ── Signal (Layer-2 evaluate) ─────────────────────────────
signal: |
  def evaluate(snapshot, regime, params):
      threshold = params["entry_threshold_z"]
      slope_bps = params["edge_per_z_bps"]
      edge_cap = params["edge_cap_bps"]
      str_cap = params["strength_cap"]

      z = snapshot.values.get("ofi_ewma_zscore")
      # Audit P1-B / 2P-3: confirm with the signed top-of-book size imbalance
      # rather than ``micro_price_zscore`` (which z-scored the ~$100 price
      # level — dominated by drift, not the sub-cent Stoikov imbalance).
      # ``book_imbalance_mean`` is the horizon-window mean of that imbalance
      # ∈ [-1, 1] (level-invariant; positive ⇒ bid-heavy ⇒ upward micro-price
      # pressure), averaged over the horizon so a single noisy instantaneous
      # quote does not drive the confirmation.
      imb = snapshot.values.get("book_imbalance_mean")
      if z is None or imb is None:
          return None

      mag = abs(z)
      if mag < threshold:
          return None

      # Audit 3P-3: require a *meaningful* same-side queue imbalance.  ``imb``
      # is a horizon mean, so the old ``imb == 0.0`` exact check was dead; an
      # epsilon band rejects a near-zero (no-confirmation) mean.  Checked before
      # the sign test so a tiny opposite-sign mean reads as "no evidence", not
      # "contradiction".
      if abs(imb) < params["imbalance_floor"]:
          return None
      # Require book imbalance aligned with signed OFI (L1 footprint).
      if (z > 0.0 and imb < 0.0) or (z < 0.0 and imb > 0.0):
          return None

      direction = LONG if z > 0 else SHORT
      edge_bps = min(mag * slope_bps, edge_cap)

      # Audit P1-2: never emit an entry below the disclosed one-way cost.
      if edge_bps <= params["cost_floor_bps"]:
          return None

      # Convex strength: superlinear above the old saturation point
      # (mag == threshold*2 => norm==1.0 => same strength as before).
      norm = mag / (threshold * 2.0)
      # Below saturation (norm <= 1.0): original linear scaling — no change
      # to existing signal sizes.  Above saturation (norm > 1.0): convex
      # upside capped at str_cap, rewarding high-conviction moments.
      if norm <= 1.0:
          strength = norm
      else:
          strength = min(1.0 + (norm - 1.0) ** 1.2, str_cap)

      return Signal(
          timestamp_ns=snapshot.timestamp_ns,
          correlation_id=snapshot.correlation_id,
          sequence=snapshot.sequence,
          symbol=snapshot.symbol,
          strategy_id="sig_benign_midcap_v1",
          direction=direction,
          strength=strength,
          edge_estimate_bps=edge_bps,
      )
