# ── Identity & Provenance ─────────────────────────────────
schema_version: "1.1"
layer: SIGNAL
alpha_id: sig_benign_midcap_v1
version: "1.0.0"
description: |
  Kyle-style informed-flow footprint on L1 (OFI + micro-price vs mid)
  in the benign / normal microstructure regime for mid-cap names.
  Institutional parent fills often arrive as VWAP/TWAP slices; those
  waves imprint the same directional imbalance this alpha reads.  The
  regime gate suppresses toxic / breakout states where the footprint
  mean-reverts or inverts.

# ── Hypothesis (causal mechanism) ─────────────────────────
hypothesis: |
  When informed trading pressure is present but transient-impact
  conditions remain orderly (low spread z-score, HMM normal-regime
  posterior elevated), persistent same-sign OFI and micro-price tilt
  relative to mid reveal a Kyle-style information footprint on L1.
  VWAP/TWAP parent slicing is a common *execution modality* that
  produces such footprints; the tradeable claim is the footprint
  itself, not the algorithm tag.  Conditional on the HMM ``normal``
  posterior and mild spreads, residual mid drift over the 120-second
  horizon aligns with the signed imbalance; the signal sizes exposure
  by standardised OFI rather than by parent-order identifiers (which
  are unobserved).

falsification_criteria:
  - |
    Spearman correlation between ofi_ewma over the prior 120s and
    return over the next 120s drops below 0.05 in the normal regime
    for >= 4 consecutive weeks.  (Mechanism requires sustained
    positive correlation; loss indicates parent-order behaviour
    has changed or the signature is saturated.)
  - |
    Out-of-sample DSR (deflated Sharpe ratio) below 1.0 across any
    single calendar quarter after promotion to LIVE.
  - |
    SEC/FINRA mandates execution transparency that eliminates the
    VWAP/TWAP slicing advantage; the parent-order leakage signature
    disappears from L1 entirely.
  - |
    Realised volatility enters a sustained high regime (HMM
    posterior P(vol_breakout) > 0.5 for > 30 trading days); the
    on-condition becomes unreachable and the strategy is inactive.

# ── Layer-1 sensor dependencies ───────────────────────────
# Every dependency is resolved at boot and consumed below.
depends_on_sensors:
  - ofi_ewma
  - book_imbalance
  - spread_z_30d
  - realized_vol_30s

# ── Universe ──────────────────────────────────────────────
# Universe selection is config-driven (mid-cap subset of the
# active platform symbols).  No static list is pinned here; the
# operator restricts via ``platform.yaml`` for the deployment.

# ── Parameters ────────────────────────────────────────────
parameters:
  entry_threshold_z:
    type: float
    default: 0.8
    min: 0.5
    max: 3.0
    description: |
      Entry trigger on |ofi_ewma_zscore|.  ~2.5% tail of the
      normal-regime OFI z-score distribution at the default value.
  edge_per_z_bps:
    type: float
    default: 4.0
    min: 1.0
    max: 8.0
    description: |
      Linear extrapolation slope from |z| to expected edge in bps.
      Capped at edge_cap_bps to avoid extrapolation tail risk.
  edge_cap_bps:
    type: float
    default: 20.0
    min: 5.0
    max: 50.0
    description: |
      Maximum reported ``edge_estimate_bps``; safety cap.
  strength_cap:
    type: float
    default: 2.0
    min: 1.0
    max: 4.0
    description: |
      Ceiling for convex strength scaling.  Signals at |z| == threshold*2
      still produce strength==1.0 (backward-compatible floor); the cap
      allows high-z signals to size proportionally larger up to this
      multiple of the base unit size.
  imbalance_floor:
    type: float
    default: 0.05
    min: 0.0
    max: 0.5
    description: |
      Minimum |book_imbalance_mean| for same-side queue confirmation. The
      epsilon band prevents a near-zero horizon mean from passing.
  cost_floor_bps:
    type: float
    default: 5.0
    min: 5.0
    max: 30.0
    description: |
      One-way cost floor (bps). Suppress entries whose computed ``edge_bps``
      does not exceed the disclosed one-way cost
      (half_spread + impact + fee = 2.0 + 2.0 + 1.0 = 5.0). Without it the
      alpha emits entries with edge as low as 3.2 bps (|z| at the default
      0.8 threshold). The round-trip Inv-12 bar (~1.5x round-trip) is
      enforced at runtime by the B4 gate. Keep aligned with
      cost_arithmetic.
# ── Horizon (Layer-2 boundary) ────────────────────────────
horizon_seconds: 120

# ── Risk Budget ───────────────────────────────────────────
risk_budget:
  max_position_per_symbol: 500
  max_gross_exposure_pct: 25.0
  max_drawdown_pct: 1.0
  capital_allocation_pct: 25.0

# ── Regime gate ───────────────────────────────────────────
regime_gate:
  regime_engine: hmm_3state_fractional
  on_condition: |
    P(normal) > 0.5 and spread_z_30d < 1.5
  off_condition: |
    P(normal) < 0.35 or spread_z_30d > 3.0 or realized_vol_30s_zscore > 4.5

# ── Cost Arithmetic Disclosure (G12) ──────────────────────
cost_arithmetic:
  edge_estimate_bps: 9.0
  half_spread_bps: 2.0
  impact_bps: 2.0
  fee_bps: 1.0
  margin_ratio: 1.8
  # One-way disclosure; the runtime gate checks round-trip survival.
  cost_basis: one_way

# KYLE_INFO is represented by standardized OFI confirmed by book imbalance.
# Each signature sensor is also a consumed dependency.
trend_mechanism:
  family: KYLE_INFO
  expected_half_life_seconds: 120
  l1_signature_sensors:
    - book_imbalance
    - ofi_ewma
    - spread_z_30d
  failure_signature:
    - "spread_z_30d > 3.0"
    - "P(vol_breakout) > 0.5"

# ── Signal (Layer-2 evaluate) ─────────────────────────────
signal: |
  def evaluate(snapshot, regime, params):
      threshold = params["entry_threshold_z"]
      slope_bps = params["edge_per_z_bps"]
      edge_cap = params["edge_cap_bps"]
      str_cap = params["strength_cap"]

      z = snapshot.values.get("ofi_ewma_zscore")
      # Confirm OFI with horizon-mean top-of-book imbalance.
      imb = snapshot.values.get("book_imbalance_mean")
      if z is None or imb is None:
          return None

      mag = abs(z)
      if mag < threshold:
          return None

      # Treat near-zero mean imbalance as no confirmation.
      if abs(imb) < params["imbalance_floor"]:
          return None
      # Require book imbalance aligned with signed OFI (L1 footprint).
      if (z > 0.0 and imb < 0.0) or (z < 0.0 and imb > 0.0):
          return None

      direction = LONG if z > 0 else SHORT
      edge_bps = min(mag * slope_bps, edge_cap)

      # Do not emit entries below disclosed one-way cost.
      if edge_bps <= params["cost_floor_bps"]:
          return None

      # Convex strength rewards signals beyond twice the threshold.
      norm = mag / (threshold * 2.0)
      # Scale linearly below saturation and convexly above it, capped at str_cap.
      if norm <= 1.0:
          strength = norm
      else:
          strength = min(1.0 + (norm - 1.0) ** 1.2, str_cap)

      return Signal(
          timestamp_ns=snapshot.timestamp_ns,
          correlation_id=snapshot.correlation_id,
          sequence=snapshot.sequence,
          symbol=snapshot.symbol,
          strategy_id="sig_benign_midcap_v1",
          direction=direction,
          strength=strength,
          edge_estimate_bps=edge_bps,
      )
