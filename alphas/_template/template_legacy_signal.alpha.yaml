# =============================================================
#   LEGACY_SIGNAL template (schema 1.1, sunset path)
#   ----------------------------------------------------------------
#   Per-tick signal alpha preserved for backward compatibility.
#   This contract is on a deprecation timer (workstream D, see
#   docs/migration/schema_1_0_to_1_1.md §11) — new alphas should
#   use template_signal.alpha.yaml (horizon-anchored SIGNAL layer).
#
#   Required blocks (loader's _REQUIRED_TOP_KEYS):
#     - schema_version, layer, alpha_id, version, description
#     - hypothesis, falsification_criteria
#     - features                  (per-tick update(quote, state, params))
#     - signal                    (evaluate(features, params))
#
#   Loading this template emits a once-per-process WARNING via
#   ``feelies.alpha.loader``'s logger pointing at the migration
#   cookbook — that banner is the deprecation contract.
#
#   See:
#     - docs/migration/schema_1_0_to_1_1.md   (LEGACY → SIGNAL cookbook)
#     - alphas/_template/template_signal.alpha.yaml  (recommended)
# =============================================================

# ── Identity & Provenance ─────────────────────────────────
schema_version: "1.1"
layer: LEGACY_SIGNAL
alpha_id: my_legacy_alpha            # ^[a-z][a-z0-9_]*$
version: "1.0.0"
description: "Short description of the per-tick edge hypothesis."

# ── Hypothesis (causal mechanism) ─────────────────────────
hypothesis: |
  Describe the structural mechanism exploited by this alpha.
  Must name a causal force (Inv-1).

falsification_criteria:
  - "Criterion 1: what disproves this hypothesis (Inv-2)"
  - "Criterion 2: additional falsification condition"

# ── Universe ──────────────────────────────────────────────
# Optional: restrict to specific symbols.  Omit for all symbols.
# symbols:
#   - AAPL
#   - MSFT

# ── Parameters ────────────────────────────────────────────
parameters:
  lookback:
    type: int
    default: 20
    min: 5
    max: 200
    description: "Number of ticks for the lookback window."
  threshold:
    type: float
    default: 1.5
    min: 0.1
    max: 10.0
    description: "Z-score threshold for signal generation."

# ── Risk Budget ───────────────────────────────────────────
risk_budget:
  max_position_per_symbol: 100      # > 0
  max_gross_exposure_pct: 5.0       # (0, 100]
  max_drawdown_pct: 1.0             # (0, 100]
  capital_allocation_pct: 10.0      # (0, 100]

# ── Features (per-tick state estimators) ─────────────────
features:
  my_feature:
    version: "1.0.0"
    description: "Example feature: deviation of mid-price from its rolling average."
    computation: |
      def initial_state():
          return {"values": []}

      def update(quote, state, params):
          mid = (quote.bid + quote.ask) / 2
          state["values"].append(float(mid))
          if len(state["values"]) > params["lookback"]:
              state["values"].pop(0)
          if len(state["values"]) < params["lookback"]:
              return 0.0
          avg = sum(state["values"]) / len(state["values"])
          return float(mid - avg)
    warm_up:
      min_events: 20      # matches lookback default
      min_duration_ns: 0
    # depends_on: []       # list of upstream feature_ids

# ── Signal (per-tick decision rule) ──────────────────────
signal: |
  def evaluate(features, params):
      val = features.values.get("my_feature", 0.0)
      threshold = params["threshold"]
      if val > threshold:
          return Signal(
              timestamp_ns=features.timestamp_ns,
              correlation_id=features.correlation_id,
              sequence=features.sequence,
              symbol=features.symbol,
              strategy_id=alpha_id,
              direction=SHORT,
              strength=min(abs(val) / (threshold * 2), 1.0),
              edge_estimate=abs(val),
          )
      if val < -threshold:
          return Signal(
              timestamp_ns=features.timestamp_ns,
              correlation_id=features.correlation_id,
              sequence=features.sequence,
              symbol=features.symbol,
              strategy_id=alpha_id,
              direction=LONG,
              strength=min(abs(val) / (threshold * 2), 1.0),
              edge_estimate=abs(val),
          )
      return None
