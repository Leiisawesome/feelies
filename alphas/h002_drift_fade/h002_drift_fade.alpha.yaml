# ── Identity & Provenance ─────────────────────────────────
schema_version: "1.0"
alpha_id: h002_drift_fade
version: "8.0.0"
description: >
  L1 microstructure alpha.  Mean-reversion on extreme microprice drift.
  Enters AGAINST extreme drift episodes (fading overshoot), exits when
  drift normalizes toward zero.  Cost-aware positioning ensures each
  trade's expected reversion exceeds round-trip costs.  Timeout horizons
  are regime-aware: shortened in vol-breakout (faster adverse selection),
  extended in compression (slower but more reliable reversion).
hypothesis: |
  At L1 tick horizons, microprice follows the SDE:
    dS = μ(t) dt + σ(t) dW
  where μ(t) is locally mean-reverting with Ornstein-Uhlenbeck dynamics:
    dμ = -κ(μ - μ̄) dt + η dW_μ     (κ > 0, mean-reversion speed)

  The corresponding Fokker-Planck PDE for the transition density p(S,t):
    ∂p/∂t = -∂(μp)/∂S + ½ ∂²(σ²p)/∂S²

  When the rolling z-score of the smoothed drift exceeds 2σ:
    |Z_μ| = |EWMA(dS) / σ_noise| > 2.3
  this signals transient price overshoot that reverts as resting
  liquidity absorbs aggressor flow.

  We FADE the drift: sell when μ is extremely positive (overbought),
  buy when extremely negative (oversold).

  Entry requires ALL of:
    1. |normalized_drift| > 2.3σ        (drift z-score extreme)
    2. Opposing imbalance_delta          (flow reversal confirmation)
    3. Spread compression (spread_z ≤ 0) (market-maker confidence)
    4. tradability_score > 0.5           (regime gate)
    5. Expected reversion > cost hurdle

  Exit triggers (any of):
    1. Drift normalizes: |Z_μ| < exit_drift_z
    2. Time limit: max_hold_ns × regime_timeout_scale  (regime-adaptive)
    3. Tick limit: max_hold_ticks × regime_timeout_scale (regime-adaptive)
    4. Spread blowout: spread > 2× max_spread_bp

  Timeout regime scaling (Bayesian posterior-weighted):
    - vol_breakout:           0.5×  (halve — fast adverse selection)
    - normal:                 1.0×  (baseline)
    - compression_clustering: 1.25× (patient — slower but surer reversion)
falsification_criteria:
  - "Daily Sharpe Ratio (DSR) < 1.0"
  - "OOS Sharpe < 0.80 net of all fees and latency"
  - "IC t-statistic < 2.5"
  - "Bootstrap p-value > 0.05 on forward 500-tick returns conditioned on entry"
  - "Regime coefficient of variation (CV) > 1.5"
  - "Latency decay > 20% (0→200 ms)"
  - "Edge vanishes outside spread-compression regime (spread_z > 0)"
  - "Net P&L negative after fees at 1.5× cost stress"
  - "Imbalance-delta confirmation adds no lift vs drift alone"
  - "Short-side edge absent or significantly weaker than long-side"
  - "Net edge ≤ 0 after transaction costs"

# ── Universe ──────────────────────────────────────────────
symbols:
  - AAPL

# ── Parameters ────────────────────────────────────────────
parameters:
  entry_drift_z:
    type: float
    default: 2.3
    range: [0.5, 5.0]
    description: "Normalized drift z-score threshold for entry (σ units).  Fade when |Z_μ| exceeds this."
  exit_drift_z:
    type: float
    default: 0.5
    range: [0.0, 1.5]
    description: "Exit when drift z-score reverts below this (moderate = capture most of reversion)."
  cost_hurdle_mult:
    type: float
    default: 1.5
    range: [1.0, 10.0]
    description: "Only enter when |drift_bps| × min_hold exceeds this multiple of round-trip spread."
  imbalance_delta_threshold:
    type: float
    default: 0.0001
    range: [0.00001, 0.05]
    description: "Minimum imbalance_delta opposing the drift for mean-reversion confirmation."
  max_spread_bp:
    type: float
    default: 3.0
    range: [1.0, 10.0]
    description: "Hard spread gate — suppress entry when spread exceeds this (bps of mid)."
  max_spread_z:
    type: float
    default: 0.0
    range: [-2.0, 1.0]
    description: "Spread z-score gate — entry requires spread_z ≤ this (0.0 = must be compressing or neutral)."
  mu_ema_alpha:
    type: float
    default: 0.995
    range: [0.80, 0.9999]
    description: "EWMA decay for drift smoothing.  0.995 ~ 140-tick half-life."
  imbalance_delta_alpha:
    type: float
    default: 0.98
    range: [0.9, 0.999]
    description: "EWMA decay for imbalance delta smoothing."
  spread_z_alpha:
    type: float
    default: 0.99
    range: [0.95, 0.999]
    description: "EWMA decay for spread z-score computation."
  min_hold_ticks:
    type: int
    default: 50
    range: [10, 10000]
    description: "Quick exit allowed after brief anti-whipsaw period."
  max_hold_ticks:
    type: int
    default: 400
    range: [100, 50000]
    description: "Forced exit timeout (tick-based)."
  max_hold_ns:
    type: int
    default: 10000000000
    range: [1000000000, 60000000000]
    description: "Forced exit timeout (time-based, 10s = 1e10 ns)."
  cooldown_ticks:
    type: int
    default: 100
    range: [20, 5000]
    description: "Minimum gap between round-trips."
  timeout_scale_vol_breakout:
    type: float
    default: 0.5
    range: [0.2, 1.0]
    description: "Timeout multiplier in vol-breakout regime.  <1 = shorten hold (faster adverse selection erodes edge)."
  timeout_scale_normal:
    type: float
    default: 1.0
    range: [0.5, 2.0]
    description: "Timeout multiplier in normal regime.  1.0 = use base max_hold_ticks / max_hold_ns unchanged."
  timeout_scale_compression:
    type: float
    default: 1.25
    range: [0.5, 2.0]
    description: "Timeout multiplier in compression-clustering regime.  >1 = more patience (slower but surer reversion)."

# ── Risk Budget ───────────────────────────────────────────
risk_budget:
  max_position_per_symbol: 3000
  max_gross_exposure_pct: 70.0
  max_drawdown_pct: 3.0
  capital_allocation_pct: 70.0

# ── Features (computation_module) ────────────────────────
features:
  - feature_id: current_spread_bp
    version: "1.0.0"
    description: "Current bid-ask spread in basis points of mid-price, for regime gating."
    depends_on: []
    warm_up:
      min_events: 1
    computation_module: current_spread_bp.py

  - feature_id: mu_ema
    version: "3.0.0"
    description: "Rolling z-score of EWMA microprice drift: Z_μ = EWMA(dS) / σ_noise.  Unbounded, in σ units."
    depends_on: []
    warm_up:
      min_events: 100
    computation_module: mu_ema.py

  - feature_id: imbalance_delta
    version: "1.0.0"
    description: "EWMA of tick-by-tick imbalance change.  Captures flow acceleration."
    depends_on: []
    warm_up:
      min_events: 50
    computation_module: imbalance_delta.py

  - feature_id: spread_z
    version: "1.0.0"
    description: "Z-score of spread vs its EWMA.  Negative = compressing (favorable entry)."
    depends_on: []
    warm_up:
      min_events: 50
    computation_module: spread_z.py

  - feature_id: drift_bps
    version: "1.0.0"
    description: "EWMA of microprice change in basis points per tick.  Properly scaled for cost comparison."
    depends_on: []
    warm_up:
      min_events: 100
    computation_module: drift_bps.py

  - feature_id: tradability_score
    version: "1.0.0"
    description: "Composite tradability gate: spread health + size health.  Score > 0.5 = tradable regime."
    depends_on: []
    warm_up:
      min_events: 50
    computation_module: tradability_score.py

# ── Signal ────────────────────────────────────────────────
signal: |
  _state = {"last_entry_seq": -999999, "in_position": False, "direction": None, "entry_ts": 0}

  # Regime-state index mapping (matches HMM3StateFractional ordering).
  _REGIME_IDX = {"compression_clustering": 0, "normal": 1, "vol_breakout": 2}

  def _regime_timeout_scale(symbol, params):
      """Bayesian posterior-weighted timeout multiplier.

      Returns EV of timeout scale over the regime posterior:
        scale = Σ_i  p_i × scale_i
      Falls back to the most conservative (shortest) scale when the
      regime engine is unavailable or un-calibrated.
      """
      factors = {
          "compression_clustering": params["timeout_scale_compression"],
          "normal":                 params["timeout_scale_normal"],
          "vol_breakout":           params["timeout_scale_vol_breakout"],
      }
      # When regime engine is absent → normal baseline (no vol info ≠ vol confirmed).
      # When regime engine returns unknown state → conservative (shortest timeout).
      fail_safe = min(factors.values())

      try:
          posteriors = regime_posteriors(symbol)
      except Exception:
          return factors["normal"]
      if posteriors is None:
          return factors["normal"]

      names = list(regime_state_names)
      return sum(
          posteriors[i] * factors.get(names[i], fail_safe)
          for i in range(len(posteriors))
      )

  def evaluate(features, params):
      if not features.warm or features.stale:
          return None

      mu = features.values.get("mu_ema", 0.0)
      drift_bps_val = features.values.get("drift_bps", 0.0)
      imb_delta = features.values.get("imbalance_delta", 0.0)
      spread_bp = features.values.get("current_spread_bp", 9999.0)
      spread_z_val = features.values.get("spread_z", 0.0)
      tradability = features.values.get("tradability_score", 0.0)

      entry_drift = params["entry_drift_z"]
      exit_drift = params["exit_drift_z"]
      cost_mult = params["cost_hurdle_mult"]
      imb_delta_thr = params["imbalance_delta_threshold"]
      max_spread = params["max_spread_bp"]
      max_sz = params["max_spread_z"]
      min_hold = params["min_hold_ticks"]
      max_hold_base = params["max_hold_ticks"]
      max_hold_ns_base = params["max_hold_ns"]
      cooldown = params["cooldown_ticks"]

      seq = features.sequence

      # ── Regime-adaptive timeouts ──
      regime_scale = _regime_timeout_scale(features.symbol, params)
      max_hold = int(max_hold_base * regime_scale)
      max_hold_ns = int(max_hold_ns_base * regime_scale)
      # Floor: never shorter than min_hold (anti-whipsaw dominates)
      max_hold = max(max_hold, min_hold + 1)

      # ── Exit logic (when in position) ──
      if _state["in_position"]:
          held = seq - _state["last_entry_seq"]
          if held < min_hold:
              return None

          # Exit conditions (any triggers exit)
          abs_mu = abs(mu)
          reverted = abs_mu < exit_drift
          timed_out_ticks = held >= max_hold
          timed_out_time = (features.timestamp_ns - _state["entry_ts"]) >= max_hold_ns
          spread_blowout = spread_bp > max_spread * 2.0

          if reverted or timed_out_ticks or timed_out_time or spread_blowout:
              _state["in_position"] = False
              _state["direction"] = None
              return Signal(
                  timestamp_ns=features.timestamp_ns,
                  correlation_id=features.correlation_id,
                  sequence=features.sequence,
                  symbol=features.symbol,
                  strategy_id=alpha_id,
                  direction=FLAT,
                  strength=1.0,
                  edge_estimate_bps=0.0,
              )
          return None

      # ── Entry gates ──

      # Hard spread gate
      if spread_bp > max_spread:
          return None

      # Spread compression gate (spread_z ≤ max_sz, default 0.0 = must be compressing)
      if spread_z_val > max_sz:
          return None

      # Tradability regime gate
      if tradability < 0.5:
          return None

      # Cooldown
      ticks_since = seq - _state["last_entry_seq"]
      if ticks_since < cooldown:
          return None

      # Cost-aware edge gate
      expected_edge_bp = abs(drift_bps_val) * min_hold
      cost_threshold_bp = cost_mult * spread_bp
      if expected_edge_bp < cost_threshold_bp:
          return None

      # Vol-scaled strength: proportional to z-score magnitude
      strength = min(abs(mu) / entry_drift, 1.0)

      # MEAN REVERSION: fade extreme drift (z-score > entry threshold)
      # Drift z-score extremely positive → price overshot UP → SHORT to fade
      # Confirmation: imbalance_delta turning NEGATIVE (flow reversing)
      if mu > entry_drift and imb_delta < -imb_delta_thr:
          _state["last_entry_seq"] = seq
          _state["in_position"] = True
          _state["direction"] = "short"
          _state["entry_ts"] = features.timestamp_ns
          return Signal(
              timestamp_ns=features.timestamp_ns,
              correlation_id=features.correlation_id,
              sequence=features.sequence,
              symbol=features.symbol,
              strategy_id=alpha_id,
              direction=SHORT,
              strength=strength,
              edge_estimate_bps=expected_edge_bp,
          )

      # Drift z-score extremely negative → price overshot DOWN → LONG to fade
      # Confirmation: imbalance_delta turning POSITIVE (flow reversing)
      if mu < -entry_drift and imb_delta > imb_delta_thr:
          _state["last_entry_seq"] = seq
          _state["in_position"] = True
          _state["direction"] = "long"
          _state["entry_ts"] = features.timestamp_ns
          return Signal(
              timestamp_ns=features.timestamp_ns,
              correlation_id=features.correlation_id,
              sequence=features.sequence,
              symbol=features.symbol,
              strategy_id=alpha_id,
              direction=LONG,
              strength=strength,
              edge_estimate_bps=expected_edge_bp,
          )

      return None
