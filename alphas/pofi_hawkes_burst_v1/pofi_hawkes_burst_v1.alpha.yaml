# ── Identity & Provenance ─────────────────────────────────
schema_version: "1.1"
layer: SIGNAL
alpha_id: pofi_hawkes_burst_v1
version: "1.0.0"
description: |
  Hawkes self-exciting burst — opportunistic 30-second momentum
  alpha that piggy-backs on a measured spike in the trade-arrival
  intensity and same-side aggressor flow.  The mechanism is the
  positive feedback loop between aggressive print intensity and
  short-horizon directional drift; once the intensity decays the
  edge collapses, hence the explicit hazard-exit subscription.

# ── Hypothesis (causal mechanism) ─────────────────────────
hypothesis: |
  When the Hawkes-process intensity λ̂ on aggressive prints jumps
  >2σ above its trailing mean *and* trade-through-rate breaches
  the empirical 80th percentile, the underlying order book is in
  a self-excited cluster: each aggressive print raises the
  conditional probability of another same-side aggressive print
  for ~30 s.  Riding the leading direction over a 30-second
  horizon harvests the positive autocorrelation in returns
  generated by the cluster before mean-reversion sets in.

falsification_criteria:
  - |
    Spearman correlation between hawkes_intensity (lagged 1 s) and
    forward 30-second return drops below 0.04 in the normal regime
    for >= 4 consecutive weeks.
  - |
    Realised half-life of the intensity spike (measured by the
    fitted Hawkes kernel) drifts above 90 s — the mechanism then
    no longer matches the declared expected_half_life_seconds=30
    and G16 rule 2 will refuse the next version bump.
  - |
    Out-of-sample DSR < 1.0 across any single calendar quarter
    after promotion to LIVE.
  - |
    Toxicity probability P(toxic) exceeds 0.5 for >= 30 trading
    days; failure_signature triggers and hazard-exit unwinds the
    book.

# ── Layer-1 sensor dependencies ───────────────────────────
depends_on_sensors:
  - hawkes_intensity
  - trade_through_rate
  - ofi_ewma
  - spread_z_30d

# ── Parameters ────────────────────────────────────────────
parameters:
  intensity_zscore_floor:
    type: float
    default: 2.0
    min: 1.5
    max: 3.5
    description: |
      Minimum z-score on the smoothed Hawkes intensity required
      to consider a burst tradable.
  trade_through_floor:
    type: float
    default: 0.6
    min: 0.3
    max: 0.95
    description: |
      Minimum trade-through-rate (fraction of marketable prints
      that walk the book) required to confirm cluster aggression.
  edge_per_z_bps:
    type: float
    default: 3.0
    min: 1.0
    max: 6.0
    description: |
      Linear extrapolation slope: bps of edge per unit |intensity z|.
  edge_cap_bps:
    type: float
    default: 12.0
    min: 4.0
    max: 25.0
    description: Hard cap on the reported ``edge_estimate_bps``.

# ── Horizon (Layer-2 boundary) ────────────────────────────
horizon_seconds: 30

# ── Risk Budget ───────────────────────────────────────────
risk_budget:
  max_position_per_symbol: 50
  max_gross_exposure_pct: 3.0
  max_drawdown_pct: 0.75
  capital_allocation_pct: 5.0

# ── Regime Gate (Phase 3 DSL) ─────────────────────────────
regime_gate:
  regime_engine: hmm_3state_fractional
  on_condition: |
    P(normal) > 0.6 and spread_z_30d < 1.0
  off_condition: |
    P(normal) < 0.4 or spread_z_30d > 2.5
  hysteresis:
    posterior_margin: 0.20
    percentile_margin: 0.30

# ── Cost Arithmetic Disclosure (G12) ──────────────────────
cost_arithmetic:
  edge_estimate_bps: 8.0
  half_spread_bps: 2.0
  impact_bps: 2.0
  fee_bps: 1.0
  margin_ratio: 1.6

# ── Trend Mechanism (v0.3 §20.5 — gate G16) ───────────────
trend_mechanism:
  family: HAWKES_SELF_EXCITE
  expected_half_life_seconds: 30
  l1_signature_sensors:
    - hawkes_intensity
    - trade_through_rate
    - ofi_ewma
  failure_signature:
    - "spread_z_30d > 2.5"
    - "P(toxic) > 0.5"

# ── Hazard-rate exit (v0.3 §20.7) ─────────────────────────
hazard_exit:
  enabled: true
  posterior_drop_threshold: 0.30

# ── Signal (Layer-2 evaluate) ─────────────────────────────
signal: |
  def evaluate(snapshot, regime, params):
      z = snapshot.values.get("hawkes_intensity_zscore")
      ttr = snapshot.values.get("trade_through_rate")
      ofi = snapshot.values.get("ofi_ewma")
      if z is None or ttr is None or ofi is None:
          return None

      if z < params["intensity_zscore_floor"]:
          return None
      if ttr < params["trade_through_floor"]:
          return None

      direction = LONG if ofi > 0.0 else SHORT
      edge_bps = min(z * params["edge_per_z_bps"], params["edge_cap_bps"])

      return Signal(
          timestamp_ns=snapshot.timestamp_ns,
          correlation_id=snapshot.correlation_id,
          sequence=snapshot.sequence,
          symbol=snapshot.symbol,
          strategy_id="pofi_hawkes_burst_v1",
          direction=direction,
          strength=min(z / (params["intensity_zscore_floor"] * 2.0), 1.0),
          edge_estimate_bps=edge_bps,
      )
