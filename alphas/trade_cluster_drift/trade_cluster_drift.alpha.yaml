schema_version: "1.0"
alpha_id: trade_cluster_drift_v10
version: "1.4.0"
description: "v10: OBI integration amplifies cluster_score when order flow aligns"
hypothesis: |
  Trade clusters confirmed by mu_ema drift persistence. v10 adds order_book_imbalance
  (OBI) feature that amplifies cluster_score when OBI direction aligns with signal
  direction, capturing immediate order flow pressure.
falsification_criteria:
  - "OOS DSR < 1.0 or bootstrap p-value > 0.05"
  - "Net edge ≤ 0 after full TC stack"
  - "Latency decay > 40% (0ms → 200ms)"

symbols:
  - AAPL
  - MSFT
  - NVDA

parameters:
  entry_threshold:
    type: float
    default: 2.0
    range: [0.5, 10.0]
    description: "Minimum |cluster_score| to emit a signal"
  mu_min_threshold:
    type: float
    default: 0.005
    range: [0.0, 0.1]
    description: "Minimum |mu_ema| for drift confirmation (filters noise-level drift)"
  exit_threshold:
    type: float
    default: 0.10
    range: [0.05, 1.0]
    description: "Exit when |cluster_score| drops below this (wide hysteresis band)"
  exit_mu_threshold:
    type: float
    default: 0.0005
    range: [0.0, 0.05]
    description: "Exit when |mu_ema| drops below this (lower than entry mu_min)"
  intensity_alpha:
    type: float
    default: 0.91
    range: [0.85, 0.99]
    description: "EMA alpha for trade_intensity (lower = more responsive, requires denser clustering)"
  aggressor_alpha:
    type: float
    default: 0.93
    range: [0.90, 0.99]
    description: "EMA alpha for aggressor_flow (lower = more responsive to recent flow)"

  vol_suppress_threshold:
    type: float
    default: 0.5
    range: [0.3, 0.9]
    description: "Suppress entries when p(vol_breakout) exceeds this"

  min_persistence:
    type: int
    default: 3
    range: [1, 20]
    description: "Minimum cluster_persistence streak required for entry (structural drift confirmation)"

  obi_amplification:
    type: float
    default: 0.5
    range: [0.0, 1.0]
    description: "OBI amplification factor: cluster_score * (1 + obi * amplification)"

  min_edge_bps:
    type: float
    default: 0.5
    range: [0.1, 2.0]
    description: "Minimum edge in bps to emit signal"

  edge_multiplier:
    type: float
    default: 3.5
    range: [1.0, 10.0]
    description: "Multiplies cluster_score to produce edge_estimate_bps"

  strength_denominator:
    type: float
    default: 1.5
    range: [0.5, 5.0]
    description: "Divides cluster_score to produce signal strength (capped at 1.0)"

  max_score_decay:
    type: float
    default: 0.999
    range: [0.99, 0.9999]
    description: "Decay factor for running max of cluster_score (per tick)"

risk_budget:
  max_position_per_symbol: 500
  max_gross_exposure_pct: 25.0
  max_drawdown_pct: 5.0
  capital_allocation_pct: 100.0

regimes:
  engine: hmm_3state_fractional
  state_names: [compression_clustering, normal, vol_breakout]

features:
  - feature_id: trade_intensity
    version: "1.0.0"
    computation_module: trade_intensity.py
    warm_up: {min_events: 100}
  - feature_id: aggressor_flow
    version: "1.0.0"
    computation_module: aggressor_flow.py
    warm_up: {min_events: 100}
  - feature_id: mu_ema
    version: "1.0.0"
    computation_module: mu_ema.py
    warm_up: {min_events: 100}
  - feature_id: cluster_persistence
    version: "1.0.0"
    computation_module: cluster_persistence.py
    warm_up: {min_events: 100}
  - feature_id: order_book_imbalance
    version: "1.0.0"
    computation_module: order_book_imbalance.py
    warm_up: {min_events: 100}

signal: |
  _prev_score = {}
  _max_score = {}

  def evaluate(features, params):
      if not features.warm or features.stale:
          return None

      def _flat():
          return Signal(
              timestamp_ns=features.timestamp_ns,
              correlation_id=features.correlation_id,
              sequence=features.sequence,
              symbol=features.symbol,
              strategy_id=alpha_id,
              direction=FLAT,
              strength=0.0,
              edge_estimate_bps=0.0,
          )

      posteriors = regime_posteriors(features.symbol)
      in_vol_breakout = False
      if posteriors is not None:
          p_vol = posteriors[2]
          if p_vol > params["vol_suppress_threshold"]:
              in_vol_breakout = True

      intensity = features.values.get("trade_intensity", 0.0)
      aggressor = features.values.get("aggressor_flow", 0.0)
      mu = features.values.get("mu_ema", 0.0)
      persistence = features.values.get("cluster_persistence", 0)
      obi = features.values.get("order_book_imbalance", 0.0)
      cluster_score = aggressor * intensity
      
      # OBI amplification: boost signal when OBI aligns with cluster_score direction
      # OBI > 0 = bid pressure (bullish), OBI < 0 = ask pressure (bearish)
      obi_factor = 1.0 + obi * params["obi_amplification"] * (1.0 if cluster_score > 0 else -1.0)
      cluster_score = cluster_score * obi_factor
      
      signs_agree = (cluster_score > 0 and mu > 0) or (cluster_score < 0 and mu < 0)

      # Normalize cluster_score by running max (with configurable decay)
      prev_max = _max_score.get(features.symbol, 0.0)
      _max_score[features.symbol] = max(prev_max * params["max_score_decay"], abs(cluster_score))

      prev = _prev_score.get(features.symbol, 0.0)
      _prev_score[features.symbol] = abs(cluster_score)
      crossing = prev < params["entry_threshold"] and abs(cluster_score) >= params["entry_threshold"]

      if in_vol_breakout:
          return _flat()

      # Persistence boost: if drift is structurally persistent, boost edge
      persistence_boost = 1.0
      if persistence >= params["min_persistence"]:
          persistence_boost = 1.5  # 50% edge boost for persistent drift

      # Minimum edge threshold to emit signal
      min_edge_bps = params.get("min_edge_bps", 0.5)

      if (crossing
              and abs(mu) >= params["mu_min_threshold"]
              and signs_agree):
          edge_bps = abs(cluster_score) * params["edge_multiplier"] * persistence_boost
          # Skip if edge below threshold
          if edge_bps < min_edge_bps:
              return None
          direction = LONG if cluster_score > 0 else SHORT
          strength = min(abs(cluster_score) / params["strength_denominator"], 1.0)
          return Signal(
              timestamp_ns=features.timestamp_ns,
              correlation_id=features.correlation_id,
              sequence=features.sequence,
              symbol=features.symbol,
              strategy_id=alpha_id,
              direction=direction,
              strength=strength,
              edge_estimate_bps=edge_bps,
          )

      if (abs(cluster_score) < params["exit_threshold"]
              or abs(mu) < params["exit_mu_threshold"]
              or not signs_agree):
          return _flat()

      return None