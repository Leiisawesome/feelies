schema_version: "1.0"
alpha_id: trade_cluster_drift_v12
version: "2.0.0"
description: "Continuous-time SDE rewrite: one latent drift state drives entry, exit, and edge"
hypothesis: |
  The alpha estimates a latent microprice drift process directly from NBBO
  observations under a continuous-time state-space model:

      dmu_t = -kappa * mu_t dt + q_t dW_t
      dM_t  = mu_t dt + sigma_t dB_t

  where M_t is the microprice and mu_t is the short-horizon directional edge.
  A position is taken only when the posterior drift z-score is materially away
  from zero and is flattened when that same posterior mean reverts toward zero.
  Entry, exit, and edge_estimate_bps are all derived from this single latent
  state rather than auxiliary heuristic confirmations.
falsification_criteria:
  - "Posterior drift z-score shows no stable relation to next-horizon realized returns"
  - "Model-implied edge_estimate_bps is not positive after transaction costs"
  - "Out-of-sample calibration degrades materially across symbols or quote-rate regimes"

symbols:
  - AAPL
  - MSFT
  - NVDA

parameters:
  drift_half_life_seconds:
    type: float
    default: 1.5
    range: [0.1, 10.0]
    description: "Half-life of latent drift mean reversion in seconds"
  vol_half_life_seconds:
    type: float
    default: 5.0
    range: [0.5, 30.0]
    description: "Half-life of observation-noise variance EWMA in seconds"
  entry_z:
    type: float
    default: 1.5
    range: [0.5, 5.0]
    description: "Enter when |posterior drift z-score| reaches this level"
  edge_confidence_z:
    type: float
    default: 0.5
    range: [0.0, 3.5]
    description: "One-sided confidence multiplier on edge uncertainty for lower-bound gating"
  exit_threshold:
    type: float
    default: 0.5
    range: [0.0, 2.0]
    description: "Flatten when |posterior drift z-score| falls back inside this band"
  cost_floor_bps:
    type: float
    default: 0.2
    range: [0.0, 10.0]
    description: "Conservative round-trip cost floor used in net-edge filtering"

risk_budget:
  max_position_per_symbol: 500
  max_gross_exposure_pct: 25.0
  max_drawdown_pct: 5.0
  capital_allocation_pct: 100.0

features:
  - feature_id: sde_drift_state
    version: "1.0.0"
    description: "Latent drift posterior from a continuous-time OU-plus-observation SDE"
    computation_module: sde_drift_state.py
    return_type: list[4]
    warm_up: {min_events: 100}

signal: |
  _state = {}

  def evaluate(features, params):
    if not features.warm or features.stale:
      return None

    def _flat():
      return Signal(
        timestamp_ns=features.timestamp_ns,
        correlation_id=features.correlation_id,
        sequence=features.sequence,
        symbol=features.symbol,
        strategy_id=alpha_id,
        direction=FLAT,
        strength=0.0,
        edge_estimate_bps=0.0,
      )

    symbol = features.symbol
    if symbol not in _state:
      _state[symbol] = {"prev_abs_z": 0.0}

    drift = features.values.get("sde_drift_state_0", 0.0)
    drift_z = features.values.get("sde_drift_state_1", 0.0)
    edge_mean_bps = features.values.get("sde_drift_state_2", 0.0)
    edge_std_bps = max(features.values.get("sde_drift_state_3", 0.0), 0.0)

    # One-sided lower confidence bound on directional edge after cost floor.
    edge_conf_z = params["edge_confidence_z"]
    directional_lcb_bps = abs(edge_mean_bps) - edge_conf_z * edge_std_bps - params["cost_floor_bps"]
    net_edge_bps = max(directional_lcb_bps, 0.0)

    prev_abs_z = _state[symbol]["prev_abs_z"]
    curr_abs_z = abs(drift_z)
    _state[symbol]["prev_abs_z"] = curr_abs_z
    crossing = prev_abs_z < params["entry_z"] and curr_abs_z >= params["entry_z"]

    if crossing and drift != 0.0 and directional_lcb_bps > 0.0:
      direction = LONG if edge_mean_bps > 0.0 else SHORT
      strength = min(net_edge_bps / (params["cost_floor_bps"] + net_edge_bps), 1.0)
      return Signal(
        timestamp_ns=features.timestamp_ns,
        correlation_id=features.correlation_id,
        sequence=features.sequence,
        symbol=features.symbol,
        strategy_id=alpha_id,
        direction=direction,
        strength=strength,
        edge_estimate_bps=net_edge_bps,
      )

    if curr_abs_z <= params["exit_threshold"] or directional_lcb_bps <= 0.0:
      return _flat()

    return None