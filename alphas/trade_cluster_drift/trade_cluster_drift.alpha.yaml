schema_version: "1.0"
alpha_id: trade_cluster_drift_v12
version: "3.0.0"
description: >
  Regime-adaptive latent drift filter with trade-flow confirmation,
  Huberized innovations, self-correcting process noise, and dynamic
  holding-horizon edge estimation.
hypothesis: |
  The alpha estimates a latent microprice drift process from NBBO
  observations under a continuous-time state-space model:

      dmu_t = -kappa(regime) * mu_t dt + q_t dW_t
      dM_t  = mu_t dt + sigma_t dB_t

  where kappa adapts to the prevailing microstructure regime (faster
  mean-reversion during compression, slower during vol_breakout).
  Innovations are Huberized to bound the influence of heavy-tailed
  microprice jumps, and process noise self-corrects via innovation
  variance tracking.  A separate trade-flow imbalance feature provides
  directional confirmation: entries are suppressed when aggressive
  trade flow opposes the inferred drift.  Edge is estimated over a
  dynamic horizon derived from the expected first-passage time of the
  drift z-score to the exit boundary, not a fixed half-life.
falsification_criteria:
  - "Posterior drift z-score shows no stable relation to next-horizon realized returns"
  - "Model-implied edge_estimate_bps is not positive after transaction costs"
  - "Out-of-sample calibration degrades materially across symbols or quote-rate regimes"
  - "Regime-adaptive kappa shows no OOS Sharpe improvement vs fixed kappa over 3-month rolling windows"
  - "Trade-flow confirmation reduces signal count >50% without proportional hit-rate improvement"

regimes:
  engine: hmm_3state_fractional

symbols:
  - AAPL
  - MSFT
  - NVDA

parameters:
  drift_half_life_seconds:
    type: float
    default: 1.5
    range: [0.1, 10.0]
    description: "Primary: half-life of latent drift mean reversion in seconds"
  vol_drift_ratio:
    type: float
    default: 3.33
    range: [2.0, 5.0]
    description: "Derived: vol_half_life = drift_half_life * ratio. Structural prior: realized microprice vol decorrelates 3–5× slower than latent drift at 1-sec frequency. Falsify by measuring realized-vol autocorrelation half-life on target symbols; re-calibrate if OOS innov_var drifts persistently from 1.0."
  entry_z:
    type: float
    default: 0.4
    range: [0.1, 5.0]
    description: "Direction gate: enter when |posterior drift z-score| reaches this level. For a passive maker, direction confidence only needs to be modest — the economic gate (passive_edge_bps) controls whether we quote at all."
  exit_fraction:
    type: float
    default: 0.33
    range: [0.2, 0.5]
    description: "Derived: exit_threshold = entry_z * exit_fraction (structural prior: exit band < entry)"
  min_net_edge_bps:
    type: float
    default: 0.05
    range: [0.01, 2.0]
    description: "Floor residual edge (bps) required after the passive-maker economic gate: half_spread - toxicity*k_adverse - min_net_edge > 0. Prevents near-zero-edge entries when the economics are marginally viable."
  huber_threshold:
    type: float
    default: 3.0
    range: [2.0, 5.0]
    description: "Robustness: clip innovation influence beyond this many sigmas"
  regime_suppress_threshold:
    type: float
    default: 0.7
    range: [0.5, 0.95]
    description: "Suppress new entries when vol_breakout posterior exceeds this level"
  max_toxicity_threshold:
    type: float
    default: 0.75
    range: [0.3, 0.9]
    description: "Primary: suppress entries when unsigned flow imbalance |buy-sell|/(buy+sell) exceeds this level (VPIN-analog). Above this threshold informed flow likely dominates and adverse-selection loss will exceed the earned half-spread."
  max_entry_spread_bps:
    type: float
    default: 2.0
    range: [0.5, 10.0]
    description: "Upper spread gate: suppress entries when quoted spread (ask-bid)/mid in basis points exceeds this threshold. Wide spreads signal elevated adverse-selection risk or fragile quote depth."
  min_entry_spread_bps:
    type: float
    default: 0.3
    range: [0.05, 5.0]
    description: "Lower spread gate: suppress entries when quoted spread is below this threshold. A spread below the floor means the half-spread earned is too thin to justify the queue risk, even at zero toxicity."
  k_adverse_bps:
    type: float
    default: 0.4
    range: [0.1, 2.0]
    description: "Adverse-selection sensitivity (bps per unit toxicity). Scales the adverse-selection cost in the passive-maker economic gate: passive_edge = half_spread - toxicity*k_adverse - min_net_edge. Calibrate empirically as the observed per-fill loss rate vs. toxicity level."

risk_budget:
  max_position_per_symbol: 500
  max_gross_exposure_pct: 25.0
  max_drawdown_pct: 5.0
  capital_allocation_pct: 100.0

features:
  - feature_id: sde_drift_state
    version: "2.0.0"
    description: "Regime-adaptive latent drift posterior with Huberized Kalman filter"
    computation_module: sde_drift_state.py
    return_type: list[6]
    warm_up: {min_events: 100}

  - feature_id: trade_flow_imbalance
    version: "1.0.0"
    description: "EWMA-decayed signed trade flow imbalance for directional confirmation"
    computation_module: trade_flow.py
    return_type: float
    warm_up: {min_events: 20}

signal: |
  try:
      _regime_fn = regime_posteriors
  except NameError:
      _regime_fn = None

  def evaluate(features, params):
    if not features.warm or features.stale:
      return None

    def _flat():
      return Signal(
        timestamp_ns=features.timestamp_ns,
        correlation_id=features.correlation_id,
        sequence=features.sequence,
        symbol=features.symbol,
        strategy_id=alpha_id,
        direction=FLAT,
        strength=0.0,
        edge_estimate_bps=0.0,
      )

    drift = features.values.get("sde_drift_state_0", 0.0)
    drift_z = features.values.get("sde_drift_state_1", 0.0)
    edge_mean_bps = features.values.get("sde_drift_state_2", 0.0)
    spread_bps = features.values.get("sde_drift_state_5", 0.0)

    exit_z = params["entry_z"] * params["exit_fraction"]

    # Regime gating: suppress new entries during high-confidence
    # vol_breakout — the OU stationarity assumption is most violated
    # in this regime. Exits always allowed (invariant 11).
    # Guard: skip gating when posteriors are degenerate (max > 0.99),
    # which indicates the HMM has locked into a single state due to
    # calibration artifacts rather than genuine regime transitions.
    if _regime_fn is not None:
      posteriors = _regime_fn(features.symbol)
      if posteriors is not None and len(posteriors) >= 3:
        max_p = max(posteriors[0], posteriors[1], posteriors[2])
        if max_p < 0.99 and posteriors[2] > params["regime_suppress_threshold"]:
          if abs(drift_z) <= exit_z:
            return _flat()
          return None

    # Spread upper gate: suppress entries when quoted spread is too wide.
    # Wide spread = fragile quote depth or elevated adverse-selection risk.
    if spread_bps > 0.0 and spread_bps > params["max_entry_spread_bps"]:
      if abs(drift_z) <= exit_z:
        return _flat()
      return None

    # Toxicity (VPIN-analog) gate: absolute cap on informed flow.
    # High |imbalance| means informed flow dominates; adverse selection
    # will exceed the earned half-spread regardless of other conditions.
    trade_imbalance = features.values.get("trade_flow_imbalance", 0.0)
    toxicity = abs(trade_imbalance)
    if toxicity > params["max_toxicity_threshold"]:
      if abs(drift_z) <= exit_z:
        return _flat()
      return None

    # Passive maker economic gate (Stoikov-Avellaneda):
    #   passive_edge = half_spread_earned - adverse_selection_cost - floor
    # This is the primary economic gating mechanism for a passive market-
    # making strategy.  The alpha earns the half-spread on a filled limit
    # order; adverse selection (scaled by current toxicity) is the main
    # cost. Entry is only viable when the net passive edge is positive.
    # This decouples the entry decision from the drift z-score magnitude,
    # fixing the taker-vs-maker architectural mismatch: a strong drift
    # signal (high z) is used only to determine DIRECTION, never to
    # justify QUOTING in the face of poor spread/toxicity economics.
    if spread_bps <= 0.0:
      return None
    half_spread_bps = spread_bps / 2.0
    adverse_sel_bps = toxicity * params["k_adverse_bps"]
    passive_edge_bps = half_spread_bps - adverse_sel_bps - params["min_net_edge_bps"]

    if passive_edge_bps <= 0.0:
      if abs(drift_z) <= exit_z:
        return _flat()
      return None

    # Spread lower gate: too-thin spread means we earn less than the floor
    # even in zero-toxicity regimes; don't chase queue risk for nothing.
    if spread_bps < params["min_entry_spread_bps"]:
      if abs(drift_z) <= exit_z:
        return _flat()
      return None

    # Direction gate: drift z-score determines which side to post.
    # A passive maker needs only modest direction confidence (entry_z = 0.4)
    # because the economic gate (passive_edge > 0) is the structural guard.
    curr_abs_z = abs(drift_z)
    if curr_abs_z >= params["entry_z"] and drift != 0.0:
      # Directional flow opposition gate: suppress when aggressive flow
      # is already running against the inferred drift direction.
      drift_sign = 1.0 if edge_mean_bps > 0.0 else -1.0
      if trade_imbalance * drift_sign < -0.2:
        return None

      direction = LONG if edge_mean_bps > 0.0 else SHORT
      net_passive = max(passive_edge_bps, 0.0)
      strength = min(net_passive / (params["min_net_edge_bps"] + net_passive + 1e-9), 1.0)
      return Signal(
        timestamp_ns=features.timestamp_ns,
        correlation_id=features.correlation_id,
        sequence=features.sequence,
        symbol=features.symbol,
        strategy_id=alpha_id,
        direction=direction,
        strength=strength,
        edge_estimate_bps=net_passive,
      )

    if curr_abs_z <= exit_z:
      return _flat()

    return None
