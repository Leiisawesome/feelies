# L1 Imbalance Momentum SIGNAL (schema 1.1)
# Structural mechanism: L1 OFI_EWMA + spread compression → short-horizon momentum drift
# Regime: spread_z_30d <=1.0 (compression) + high OFI persistence

schema_version: "1.1"
layer: SIGNAL
alpha_id: pofi_l1_imbalance_momentum_v1
version: "1.0.0"
description: |
  L1 order-flow imbalance momentum under spread compression regimes. Exploits persistent aggressive flow (OFI_EWMA) leaking into price drift when liquidity providers are reluctant (spread narrow). Pring-style volume/price confirmation + Pedersen liquidity provision / trend-following hybrid.

hypothesis: |
  Aggressive liquidity takers (informed or momentum) generate positive OFI_EWMA that must be absorbed by L1 book. In spread compression regime, this imbalance creates short-term upward (or downward) price pressure before replenishment. Observable L1 signature: sustained OFI > threshold + spread_z <= 1.0.

falsification_criteria:
  - Spearman correlation OFI_EWMA → forward 300s return < 0.08 in on-regime for 4+ weeks
  - Regime decay hazard rate > 0.5 within horizon

depends_on_sensors:
  - ofi_ewma
  - micro_price
  - spread_z_30d

parameters:
  entry_threshold_z:
    type: float
    default: 1.8
    min: 1.2
    max: 3.0
  horizon_seconds:
    type: int
    default: 300
    description: signal horizon window in seconds

horizon_seconds: 300

regime_gate:
  regime_engine: hmm_3state_fractional
  on_condition: |
    P(normal) > 0.65 and spread_z_30d <= 1.0 and abs(ofi_ewma_z) > 1.5
  off_condition: |
    P(normal) < 0.4 or spread_z_30d > 1.8
  hysteresis:
    posterior_margin: 0.25

cost_arithmetic:
  edge_estimate_bps: 8.5
  half_spread_bps: 2.0
  impact_bps: 2.5
  fee_bps: 1.0
  margin_ratio: 1.5455

trend_mechanism:
  family: KYLE_INFO
  expected_half_life_seconds: 450
  l1_signature_sensors:
    - kyle_lambda_60s
    - ofi_ewma
  failure_signature:
    - "spread_z_30d > 2.0"

signal: |
  def evaluate(snapshot, regime, params):
      ofi_z = snapshot.values.get('ofi_ewma_zscore', 0)
      spread_z = snapshot.values.get('spread_z_30d', 99)
      if abs(ofi_z) < params['entry_threshold_z'] or spread_z > 1.0:
          return None
      direction = 1 if ofi_z > 0 else -1
      edge = min(abs(ofi_z) * 3.5, 25.0)  # bps
      return Signal(
          symbol=snapshot.symbol,
          direction=direction,
          strength=abs(ofi_z)/3.0,
          edge_estimate_bps=edge,
          timestamp_ns=snapshot.timestamp_ns
      )
