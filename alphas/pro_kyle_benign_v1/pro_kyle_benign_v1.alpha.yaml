# ── Identity & Provenance ─────────────────────────────────
schema_version: "1.1"
layer: PORTFOLIO

alpha_id: pro_kyle_benign_v1
version: "1.0.0"
description: |
  Cross-sectional coordinator for two complementary KYLE_INFO
  mechanisms: benign-regime informed-flow footprint
  (sig_benign_midcap_v1) and five-minute Kyle-drift momentum
  (sig_kyle_drift_v1).  Routes both SIGNAL streams through the
  platform composition pipeline (rank → factor-neutralize →
  sector-match → turnover-optimize) so they never double-trade
  the same symbol on the same tick via EdgeWeightedArbitrator
  fallback.

# ── Hypothesis (causal mechanism) ─────────────────────────
hypothesis: |
  Both upstream alphas share the KYLE_INFO mechanism but operate on
  different horizons and feature composites (120 s OFI-zscore
  footprint vs 300 s λ̂-weighted drift).  Their conditioning sets are
  partially orthogonal: sig_benign_midcap_v1 gates on a tighter
  normal-regime posterior and low spread; sig_kyle_drift_v1 gates
  on λ̂ exceeding the 70th percentile.  Combining under a single
  PORTFOLIO layer prevents signal cancellation through arbitration
  and correctly sizes net exposure across both contributions before
  risk veto.

falsification_criteria:
  - |
    Joint Sharpe post-cost falls below the better of the two
    standalone alphas for >= 4 consecutive weeks.
  - |
    KYLE_INFO mechanism share of gross exposure exceeds 0.7 for
    >= 3 consecutive composition barriers.
  - |
    Out-of-sample DSR < 1.0 across any single calendar quarter.

# ── Upstream SIGNAL dependencies ──────────────────────────
depends_on_signals:
  - sig_benign_midcap_v1
  - sig_kyle_drift_v1

# ── Universe ──────────────────────────────────────────────
# Intersection of platform.yaml symbols and the mid-cap names
# covered by the benign regime alpha.
universe:
  - AAPL
  - MSFT
  - NVDA

# ── Horizon (Layer-3 boundary; >= longest upstream horizon) ─
horizon_seconds: 300

# ── Factor neutralization ─────────────────────────────────
# Opt out: no factor_loadings_dir configured in the reference
# platform.yaml; the FactorNeutralizer is a no-op when
# factor_loadings_dir is null.  Set to true and configure
# factor_loadings_dir in platform.yaml for production use.
factor_neutralization: false

# ── Cost Arithmetic Disclosure (G12) ──────────────────────
# Blended estimate: upstream margins are both 1.8; use a
# conservative 2.0 with impact reflecting 300 s horizon.
cost_arithmetic:
  edge_estimate_bps: 10.0
  half_spread_bps: 2.0
  impact_bps: 2.0
  fee_bps: 0.5
  margin_ratio: 2.22

# ── Trend Mechanism concentration caps (G16 PORTFOLIO rule 8) ─
# Both upstreams are KYLE_INFO; single-family cap must be >= 1.0
# so full-book deployment is structurally reachable (G16 rule 8).
trend_mechanism:
  consumes:
    - {family: KYLE_INFO, max_share_of_gross: 1.0}
  max_share_of_gross: 1.0

# ── Risk Budget ───────────────────────────────────────────
risk_budget:
  max_position_per_symbol: 150
  max_gross_exposure_pct: 10.0
  max_drawdown_pct: 2.0
  capital_allocation_pct: 15.0

# ── Parameters ────────────────────────────────────────────
parameters:
  decay_weighting_enabled:
    type: bool
    default: false
    description: |
      When true, weights upstream signal strengths by
      exp(-age_seconds / horizon_seconds) before ranking.
      Disabled by default to match v0.2 parity baseline.
