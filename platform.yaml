# Platform reference config (v0.2.0-dev). PlatformConfig snapshots a checksum
# from the normalized dict (paths baselined) for audit/replay.
version: "0.2.0-dev"
author: "system"

# BACKTEST | PAPER | LIVE
mode: BACKTEST

symbols:
  - AAPL
  - MSFT
  - NVDA

# Scanned for *.alpha.yaml if set; here we use explicit paths below.
alpha_spec_dir: null

alpha_specs:
  - alphas/pofi_benign_midcap_v1/pofi_benign_midcap_v1.alpha.yaml
  - alphas/pofi_hawkes_burst_v1/pofi_hawkes_burst_v1.alpha.yaml
  - alphas/pofi_inventory_revert_v1/pofi_inventory_revert_v1.alpha.yaml
  - alphas/pofi_kyle_drift_v1/pofi_kyle_drift_v1.alpha.yaml
  - alphas/pofi_moc_imbalance_v1/pofi_moc_imbalance_v1.alpha.yaml

parameter_overrides: {}

# Default true in code: schema-1.1 SIGNAL/PORTFOLIO need trend_mechanism (G16).
# false here only because pofi_benign_midcap_v1 is the v0.2 parity anchor without
# that block. Remove this (or drop benign) for strict bundles.
# Do not ship false to PAPER/LIVE with mixed alphas — it disables G16 for the whole bundle.
enforce_trend_mechanism: false

regime_engine: hmm_3state_fractional

# data_dir: data/
# event_log_path: data/event_log.jsonl

# Sandbox backtest equity; overlays must set real limits for PAPER/LIVE.
account_equity: 100000.0

# Per-symbol cap in shares (not USD). High value here; gross cap below binds for this universe.
risk_max_position_per_symbol: 50000

# Gross as % of equity (200 = 2×). Research-only; production should lower per policy.
risk_max_gross_exposure_pct: 200.0

risk_max_drawdown_pct: 5.0

backtest_fill_latency_ns: 30000000
signal_entry_cooldown_ticks: 100

# Fixed dollars/share — BACKTEST reference only; vol-scaled overrides better for production.
stop_loss_per_share: 0.005
trail_activate_per_share: 0.01
trail_pct: 0.50

cost_min_spread_bps: 0.0
cost_commission_per_share: 0.0035
cost_taker_exchange_per_share: 0.003
cost_maker_exchange_per_share: -0.002
cost_passive_adverse_selection_bps: 0.5
# 0 = no SEC fee on sells; set from current rate for realism.
cost_sell_regulatory_bps: 0.0
cost_stress_multiplier: 1.0
cost_min_commission: 0.35
cost_max_commission_pct: 1.0

# Pinned explicitly (defaults are 0). signal_min_edge_cost_ratio: suppress when
# edge < ratio × 2 × cost_bps. 0 = off (disclosure-only G12 in backtest); production ≥1.5 typical.
signal_min_edge_cost_ratio: 0.0

# Short borrow annual bps; 0 = off (optimistic for SHORT alphas like benign).
cost_htb_borrow_annual_bps: 0.0

execution_mode: passive_limit
passive_fill_delay_ticks: 3
passive_max_resting_ticks: 8000
# Aggressive volume through limit before level fill (L1 queue proxy). 0 = delay-ticks only.
passive_queue_position_shares: 200
passive_cancel_fee_per_share: 0.0

platform_min_order_shares: 50

# Explicit no-op overrides; PAPER/LIVE often set promotion_ledger_path.
gate_thresholds: {}
promotion_ledger_path: null

# Phase-2: optional; omit for legacy path. See docs/three_layer_architecture.md.

market_id: US_EQUITY
session_kind: RTH

# Alpha horizon_seconds must be in this set (G7).
horizons_seconds:
  - 30
  - 120
  - 300
  - 900
  - 1800

# session_open_ns: null  # else first event anchors backtests

# For scheduled_flow_window sensor (e.g. pofi_moc_imbalance_v1); bootstrap injects calendar.
event_calendar_path: storage/reference/event_calendar/2026-01-15.yaml

# Sensors for alphas 1–5 (union of their depends_on_sensors).
sensor_specs:

  - sensor_id: ofi_ewma
    sensor_version: "1.0.0"
    cls: feelies.sensors.impl.ofi_ewma.OFIEwmaSensor
    params:
      alpha: 0.1
      warm_after: 50
    subscribes_to: [NBBOQuote]
    input_sensor_ids: []
    min_history: 50
    throttled_ms: null

  - sensor_id: micro_price
    sensor_version: "1.0.0"
    cls: feelies.sensors.impl.micro_price.MicroPriceSensor
    params:
      warm_after: 1
    subscribes_to: [NBBOQuote]
    input_sensor_ids: []
    min_history: 1
    throttled_ms: null

  - sensor_id: spread_z_30d
    sensor_version: "1.0.0"
    cls: feelies.sensors.impl.spread_z_30d.SpreadZScoreSensor
    params:
      window: 6000
      min_std: 1.0e-9
    subscribes_to: [NBBOQuote]
    input_sensor_ids: []
    min_history: 6000
    throttled_ms: null

  - sensor_id: quote_replenish_asymmetry
    sensor_version: "1.0.0"
    cls: feelies.sensors.impl.quote_replenish_asymmetry.QuoteReplenishAsymmetrySensor
    params:
      window_seconds: 5
      min_observations: 20
    subscribes_to: [NBBOQuote]
    input_sensor_ids: []
    min_history: 20
    throttled_ms: null

  - sensor_id: quote_hazard_rate
    sensor_version: "1.0.0"
    cls: feelies.sensors.impl.quote_hazard_rate.QuoteHazardRateSensor
    params:
      window_seconds: 5
      min_samples: 20
    subscribes_to: [NBBOQuote]
    input_sensor_ids: []
    min_history: 20
    throttled_ms: null

  - sensor_id: hawkes_intensity
    sensor_version: "1.1.0"
    cls: feelies.sensors.impl.hawkes_intensity.HawkesIntensitySensor
    params:
      alpha: 0.4
      beta: 0.05
      warm_window_seconds: 60
      warm_trades_per_side: 20
    subscribes_to: [Trade]
    input_sensor_ids: []
    min_history: 20
    throttled_ms: null

  - sensor_id: trade_through_rate
    sensor_version: "1.0.0"
    cls: feelies.sensors.impl.trade_through_rate.TradeThroughRateSensor
    params:
      window_seconds: 30
      min_trades: 20
    subscribes_to: [NBBOQuote, Trade]
    input_sensor_ids: []
    min_history: 20
    throttled_ms: null

  - sensor_id: kyle_lambda_60s
    sensor_version: "1.1.0"
    cls: feelies.sensors.impl.kyle_lambda_60s.KyleLambda60sSensor
    params:
      window_seconds: 60
      min_samples: 30
    subscribes_to: [NBBOQuote, Trade]
    input_sensor_ids: []
    min_history: 30
    throttled_ms: null

  # calendar param injected from event_calendar_path at bootstrap.
  - sensor_id: scheduled_flow_window
    sensor_version: "1.0.0"
    cls: feelies.sensors.impl.scheduled_flow_window.ScheduledFlowWindowSensor
    params: {}
    subscribes_to: [NBBOQuote]
    input_sensor_ids: []
    min_history: 0
    throttled_ms: null
