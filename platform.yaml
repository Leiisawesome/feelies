# ═══════════════════════════════════════════════════════════
# PLATFORM CONFIGURATION — Reference Config
# Version: 0.1.0
# ═══════════════════════════════════════════════════════════

# ── Provenance (Invariant 13) ─────────────────────────────
version: "0.1.0"
author: "system"

# ── Operating Mode ────────────────────────────────────────
# BACKTEST | PAPER | LIVE
mode: BACKTEST

# ── Trading Universe ─────────────────────────────────────
symbols:
  - AAPL
  - MSFT
  - NVDA

# ── Alpha Discovery ──────────────────────────────────────
# Directory scanned for *.alpha.yaml files at boot time.
alpha_spec_dir: alphas/h002_sde_pde_mu_drift

# Explicit alpha spec paths (in addition to directory scan).
alpha_specs: []

# Per-alpha parameter overrides keyed by alpha_id.
parameter_overrides:
  h002_sde_pde_mu_drift:
    mu_threshold: 0.0005

# ── Regime Engine ─────────────────────────────────────────
# Name of the shared regime engine, or null to disable.
regime_engine: null

# ── Data Paths ────────────────────────────────────────────
# data_dir: data/
# event_log_path: data/event_log.jsonl

# ── Account & Risk ────────────────────────────────────────
account_equity: 100000.0

risk_max_position_per_symbol: 50000
risk_max_gross_exposure_pct: 200.0
risk_max_drawdown_pct: 5.0

# ── Backtest Settings ─────────────────────────────────────
# Simulated fill latency in nanoseconds (0 = instant fills).
backtest_fill_latency_ns: 0

# ── Cost Model ────────────────────────────────────────────
# Minimum half-spread cost floor in basis points.
# Actual half-spread from each quote is used when larger.
cost_min_spread_bps: 0.5
# Flat per-share commission.
cost_commission_per_share: 0.005
# Minimum commission per order (floor).
cost_min_commission: 1.00
