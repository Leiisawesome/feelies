name: Alpha Backtest CI

on:
  push:
    branches: ["main", "copilot/**", "feature/**"]
    paths:
      - "alphas/**"
      - "scripts/run_backtest.py"
      - "src/**"
      - "tests/**"
      - "platform.yaml"
      - ".github/workflows/backtest.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "alphas/**"
      - "scripts/run_backtest.py"
      - "src/**"
      - "tests/**"
      - "platform.yaml"
      - ".github/workflows/backtest.yml"
  workflow_dispatch:
    inputs:
      alpha:
        description: "Alpha ID to run deterministic backtest for"
        required: false
        default: "pofi_l1_imbalance_momentum_v1"
      symbol:
        description: "Symbol (e.g. AAPL)"
        required: false
        default: "AAPL"
      date:
        description: "Backtest date (YYYY-MM-DD)"
        required: false
        default: "2026-04-08"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  alpha-unit-tests:
    name: Alpha unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run alpha unit tests
        run: |
          python -m pytest tests/alpha/ -v \
            --tb=short \
            -m "not functional and not backtest_validation and not slow"

      - name: Validate pofi_l1_imbalance_momentum_v1 loads cleanly
        run: |
          python -c "
          from feelies.alpha.loader import AlphaLoader
          m = AlphaLoader(enforce_trend_mechanism=True).load(
              'alphas/pofi_l1_imbalance_momentum_v1'
              '/pofi_l1_imbalance_momentum_v1.signal.alpha.yaml'
          )
          print(f'[OK] {m.manifest.alpha_id} v{m.manifest.version}')
          print(f'     horizon={m.horizon_seconds}s  '
                f'trend={m.trend_mechanism_enum.name}  '
                f'half_life={m.expected_half_life_seconds}s')
          print(f'     margin_ratio={m.cost.margin_ratio}  '
                f'edge={m.cost.edge_estimate_bps} bps')
          "

      - name: Validate run_backtest.py --alpha flag is recognised
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'src')
          from scripts.run_backtest import parse_args
          args = parse_args([
              '--alpha', 'pofi_l1_imbalance_momentum_v1',
              '--symbol', 'AAPL',
              '--date', '2026-04-08',
          ])
          assert args.alpha == 'pofi_l1_imbalance_momentum_v1', args.alpha
          assert args.symbol == ['AAPL'], args.symbol
          assert args.date == '2026-04-08', args.date
          print('[OK] --alpha flag parsed correctly')
          "

  integration-tests:
    name: Integration / parity tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run integration test suite (no external API)
        run: |
          python -m pytest tests/ -v \
            --tb=short \
            -m "not functional and not backtest_validation and not slow" \
            --ignore=tests/perf

  live-backtest:
    name: Deterministic backtest (${{ inputs.alpha || 'pofi_l1_imbalance_momentum_v1' }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Only runs when triggered manually with a MASSIVE_API_KEY secret available.
    if: ${{ github.event_name == 'workflow_dispatch' && secrets.MASSIVE_API_KEY != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,massive]"

      - name: Run deterministic backtest
        env:
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
        run: |
          python scripts/run_backtest.py \
            --alpha ${{ inputs.alpha || 'pofi_l1_imbalance_momentum_v1' }} \
            --symbol ${{ inputs.symbol || 'AAPL' }} \
            --date ${{ inputs.date || '2026-04-08' }} \
            --emit-signals-jsonl \
            --emit-hazard-spikes-jsonl \
            --emit-hazard-exits-jsonl \
            --trace-signal-orders
