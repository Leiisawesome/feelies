# Alpha health defaults — tune thresholds per research programme.

metadata_required_fields:
  - alpha_name
  - universe
  - timeframe
  - data_source
  - prediction_horizon
  - execution_assumption
  - cost_assumption

min_observations: 1000
min_trading_days: 20
min_abs_ic: 0.005
min_ic_t_stat: 2.0
min_monotonicity_score: 0.6
min_signal_coverage: 0.70
sharpe_annualization_factor: 252.0

min_net_pnl: 0
min_net_sharpe: 0.5
min_gross_edge_to_cost_ratio: 1.5
warn_gross_edge_to_cost_ratio: 2.0
max_cost_share_of_gross_edge: 0.67

max_single_regime_pnl_contribution: 0.60
min_regime_sample_size: 100
max_losing_common_regime_fraction: 0.50

min_profitable_neighbor_fraction: 0.50
max_best_to_median_sharpe_ratio: 3.0
max_oos_sharpe_degradation: 0.50

max_drawdown_fraction_of_total_profit: 0.50
max_single_day_loss_fraction_of_total_profit: 0.25
max_single_day_profit_contribution: 0.30
max_single_symbol_pnl_contribution: 0.30

max_participation_rate_liquid: 0.01
max_participation_rate_illiquid: 0.0025
max_order_size_fraction_of_top_of_book: 0.25

max_corr_to_existing_alpha: 0.70
min_marginal_sharpe_improvement: 0.05

max_missing_data_rate: 0.05

category_weights:
  metadata_definition: 0.10
  data_integrity_causality: 0.15
  raw_predictive_power: 0.15
  cost_execution_survival: 0.15
  regime_robustness: 0.10
  robustness_overfit: 0.10
  risk_drawdown: 0.10
  capacity_liquidity: 0.05
  portfolio_fit: 0.05
  production_readiness: 0.05
