# Edge-weighted sizing DRIVE — single-alpha A/B "B" leg (G-7 S2).
#
# Identical to backtest_app.yaml but with edge-weighted sizing DRIVEN
# (sizer_tilt_drive: true).  This is the "B" leg of the single-alpha G-7
# PnL A/B:
#
#   A (baseline, equal-weight sizing):
#     run_backtest.py --config configs/backtest_app.yaml \
#         --symbol APP --date 2026-06-01
#   B (edge-weighted sizing):
#     run_backtest.py --config configs/backtest_app_edge_drive.yaml \
#         --symbol APP --date 2026-06-01
#
# The shadow showed edge-weighting de-weights this low-edge alpha (~50%
# median haircut, 93% downsize) — secondary to the multi-alpha A/B, this one
# tests whether shrinking the marginal near-threshold entries helps or hurts.
#
# Inventory factor OFF (inert on this data).  edge_ref_bps=11.
extends: backtest_app.yaml

sizer_edge_weighting_enabled: true
sizer_edge_ref_bps: 11.0
sizer_edge_floor: 0.25
sizer_edge_cap: 2.0
sizer_inventory_penalty_enabled: false
sizer_tilt_floor: 0.10
sizer_tilt_cap: 3.0
sizer_tilt_drive: true
