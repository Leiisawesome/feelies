# Edge-weighted sizing DRIVE — multi-alpha A/B "B" leg (G-7 S2).
#
# Identical to backtest_multialpha.yaml but with edge-weighted sizing DRIVEN
# (sizer_tilt_drive: true).  This is the "B" leg of the G-7 PnL A/B:
#
#   A (baseline, equal-weight sizing):
#     run_backtest.py --config configs/backtest_multialpha.yaml \
#         --symbol APP --date 2026-06-01
#   B (edge-weighted sizing):
#     run_backtest.py --config configs/backtest_multialpha_edge_drive.yaml \
#         --symbol APP --date 2026-06-01
#
# Compare Net P&L, max exposure, and max drawdown (broaden across days).  The
# shadow said edge-weighting is size-neutral on average here (mean tilt 1.02,
# two-sided) — this A/B says whether sizing each signal by its edge IMPROVES
# risk-adjusted PnL vs equal-weighting.
#
# Inventory factor is OFF: the shadow showed it inert on this data (holdings
# never approach the per-symbol cap).  edge_ref_bps=11 is the recalibrated
# reference (see backtest_sizing_tilt.yaml for the derivation).
extends: backtest_multialpha.yaml

sizer_edge_weighting_enabled: true
sizer_edge_ref_bps: 11.0
sizer_edge_floor: 0.25
sizer_edge_cap: 2.0
sizer_inventory_penalty_enabled: false
sizer_tilt_floor: 0.10
sizer_tilt_cap: 3.0
sizer_tilt_drive: true
