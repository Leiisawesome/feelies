# APP evidence backtest — single-alpha config for sig_dislocation_lambda_drift_v1.
#
# Usage (protocol §7.1 baseline / §7.2 stress):
#   uv run python scripts/run_backtest.py \
#       --config configs/bt_sig_dislocation_lambda_drift_v1.yaml \
#       --symbol APP --date <session>
#   uv run feelies backtest --config configs/bt_sig_dislocation_lambda_drift_v1.yaml \
#       --symbol APP --date <session> --inv12-stress
#
# Instantiated from the 00c pinned realism profile
# (docs/research/prompt_pack_00c_eval_canon.md, pinned at commit
# 825a7bc3bda48d3a819fed0a498dbf9d65e711c4).  Realism knobs are
# INHERITED via ``extends:``, not restated (restating them would create
# a second place for drift); the checksum guard
# (tests/acceptance/test_bt_dislocation_lambda_config_guard.py) pins
# the realism-knob subset of PlatformConfig.snapshot() to the
# instantiation-time value below — any knob drift, including drift
# inherited through platform.yaml, fails the guard.
#
# Realism-knob snapshot checksum at instantiation (PYTHONHASHSEED=0,
# sorted-JSON SHA-256 over the 00c §1 table fields; 00c O-1 — captured
# when this config was created, no pre-recorded value exists to copy):
#   REALISM_KNOB_CHECKSUM: 5675c18eedd0cdff70f392ace9f89c45aaea31933bf41775e3e1b0c117a35565
#
# Deployable set D = {APP} (protocol E.4 / A-2).  RMBS is step-2
# evidence-only via the IC harness (scripts/sensor_feature_ic.py reads
# the DiskEventCache directly, no backtest config); OLN is
# tick-artifact-only.  Neither ever appears in a run config's symbol
# list (Lei ruling 1, 2026-07-14 — the config-scope guard asserts
# symbols == ["APP"] exactly).
#
# Evidence grid = the 20 named sessions (03c AMENDMENT 1):
#   2025-11-25 2025-12-01 2025-12-02 2025-12-04 2025-12-22
#   2025-12-26 2025-12-30 2026-01-05 2026-01-12 2026-01-15
#   2026-01-20 2026-01-22 2026-01-26 2026-01-27 2026-04-01
#   2026-04-02 2026-04-07 2026-04-10 2026-04-16 2026-04-22
#
# Two-axes honesty: steps 7–8 numbers produced under this config are
# evidence only under the P0-6 (Task 12-P AXIS-1) precondition,
# re-verified green at execution time, with AXIS-2 residuals reported
# alongside per the parity-gap register.
extends: ../platform.yaml

symbols:
  - APP

alpha_specs:
  - alphas/sig_dislocation_lambda_drift_v1/sig_dislocation_lambda_drift_v1.alpha.yaml

# Deployment convention (00c amendment; the reference profile's 1.0 is
# documented-permissive).
signal_min_edge_cost_ratio: 1.5

# Session-time discipline — spec §1.4 verbatim (fixed constants, not
# free-range parameters; varying either is +1 N).  09:35–15:50 entry
# window: every H = 300 s hold completes inside RTH; no window overlaps
# the opening cross, the closing cross, or the 15:50 imbalance
# dissemination.
no_entry_first_seconds: 300
session_flatten_enabled: true
session_flatten_seconds_before_close: 600

# Capital base — Lei ruling (a), commit-1 pause 2026-07-14 (binding
# arithmetic in impl plan §7.1): 80 sh × grid-max APP session-median
# RTH bid $729.51 (2025-12-22) = $58,360.80 > $50,000, and the alpha
# loader caps risk_budget percentages at 100, so no percentage clears
# the 80-share mechanism anchor at the inherited $50k base.  BT-15
# bracket top ($25k–$100k), using the placeholder's documented
# override point ("override for your book", platform.yaml).  With the
# alpha's 80/80 budget: allocation $80,000 and compounded per-alpha
# exposure cap $64,000 both ≥ $58,360.80 — the 80-share anchor is the
# binding constraint.  Not a 00c realism knob (not in the §1 table);
# the checksum guard is unaffected.
account_equity: 100000.0

parameter_overrides: {}
