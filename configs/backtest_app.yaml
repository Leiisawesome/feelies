# APP research backtest — tuned sig_benign_midcap_v1 entry gate overrides.
#
# Usage:
#   uv run python scripts/run_backtest.py --config configs/backtest_app.yaml \
#       --symbol APP --date 2026-03-26
#   uv run feelies backtest --config configs/backtest_app.yaml --symbol APP --date 2026-03-26
#
# Locked regression baseline: tests/acceptance/test_backtest_app_baseline.py
#
# Inherits platform defaults via ``extends:``; only APP-specific deltas below.
extends: ../platform.yaml

symbols:
  - APP

# Inv-12 margin gate for APP research (G12-equivalent 1.5× round-trip floor).
signal_min_edge_cost_ratio: 1.5

parameter_overrides:
  sig_benign_midcap_v1:
    entry_threshold_z: 1.5
    edge_per_z_bps: 6.0
