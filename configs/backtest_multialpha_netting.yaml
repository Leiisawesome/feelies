# Multi-alpha A/B config: identical to backtest_multialpha.yaml but with
# cross-alpha netting DRIVEN (G-5 N2).  Use as the "B" leg of a PnL A/B:
#
#   A (baseline, netting off):
#     run_backtest.py --config configs/backtest_multialpha.yaml \
#         --symbol APP --date 2026-03-26
#   B (netting on):
#     run_backtest.py --config configs/backtest_multialpha_netting.yaml \
#         --symbol APP --date 2026-03-26
#
# Compare the reports' Net P&L, fills, and max drawdown (broaden across
# several days/symbols).  This is the decision-grade evidence for enabling
# netting — the NetDivergence count says netting *changes* decisions, this
# A/B says whether the change *helps*.
#
# ``extends`` keeps this byte-identical to the measurement config except the
# one flag, so the A/B isolates exactly the netting effect.
extends: backtest_multialpha.yaml

enable_portfolio_netting: true
